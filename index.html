<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Flatool | Curious Curriculum Club</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/browser@1.7.2/build/stlite.css" />
    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
      }

      body {
        background: #111111;
      }

      #flatool-boot-cover {
        align-items: center;
        background: #111111;
        color: #f7f2e8;
        display: flex;
        inset: 0;
        justify-content: center;
        position: fixed;
        z-index: 2147483647;
      }

      #flatool-boot-cover.is-hidden {
        opacity: 0;
        pointer-events: none;
        transition: opacity 240ms ease;
      }

      .boot-mark {
        color: #ffffff;
        font-family: Arial, Helvetica, sans-serif;
        font-size: clamp(2rem, 5vw, 3.6rem);
        font-weight: 900;
        letter-spacing: 0;
        line-height: 1;
        text-transform: uppercase;
      }

      .boot-submark {
        color: #b9b4aa;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 0.82rem;
        font-weight: 700;
        margin-top: 0.9rem;
      }

      #root button.flatool-key-button {
        align-items: center;
        background: transparent !important;
        border: 1px solid rgba(255, 255, 255, 0.22) !important;
        border-radius: 8px !important;
        box-sizing: border-box !important;
        color: transparent !important;
        display: inline-flex;
        font-size: 0 !important;
        height: 2.75rem !important;
        justify-content: center;
        min-height: 2.75rem !important;
        padding: 0 !important;
        position: relative;
      }

      #root [data-testid="stTextInput"] input,
      #root input[type="text"] {
        box-sizing: border-box !important;
        height: 2.75rem !important;
        min-height: 2.75rem !important;
      }

      #root button.flatool-key-button * {
        display: none !important;
      }

      #root button.flatool-key-button::after {
        color: #ffffff;
        content: "key";
        font-family: "Material Symbols Rounded", "Material Icons", sans-serif;
        font-size: 1.45rem;
        font-weight: 400;
        line-height: 1;
        text-transform: none;
      }

      #root button.flatool-key-button:hover {
        background: rgba(255, 255, 255, 0.08) !important;
        border-color: rgba(255, 255, 255, 0.42) !important;
      }
    </style>
  </head>
  <body>
    <div id="flatool-boot-cover">
      <div>
        <div class="boot-mark">Flatool</div>
        <div class="boot-submark">by Curious Curriculum Club</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module">
      import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@1.7.2/build/stlite.js";

      const fileNameDescriptor = Object.getOwnPropertyDescriptor(File.prototype, "name");
      if (fileNameDescriptor?.get && fileNameDescriptor.configurable) {
        Object.defineProperty(File.prototype, "name", {
          configurable: true,
          enumerable: fileNameDescriptor.enumerable,
          get() {
            return this.webkitRelativePath || fileNameDescriptor.get.call(this);
          },
        });
      }

      mount(
        {
          entrypoint: "app.py",
          files: {
            "app.py": {
              url: "./app.py",
            },
            "flatool_core.py": {
              url: "./flatool_core.py",
            },
          },
          requirements: ["python-pptx", "PyMuPDF"],
          streamlitConfig: {
            "client.toolbarMode": "viewer",
            "theme.base": "dark",
            "theme.primaryColor": "#4f9cff",
            "theme.backgroundColor": "#111111",
            "theme.secondaryBackgroundColor": "#181818",
            "theme.textColor": "#f7f2e8",
          },
        },
        document.getElementById("root"),
      );

      const revealApp = () => {
        const cover = document.getElementById("flatool-boot-cover");
        cover?.classList.add("is-hidden");
        setTimeout(() => cover?.remove(), 320);
      };
      const appIsReady = () =>
        document.querySelector('[data-testid="stTextInput"]') ||
        document.querySelector('[data-testid="stFileUploader"]') ||
        document.querySelector('[data-testid="stRadio"]');
      const polishFlatoolUi = () => {
        document.querySelectorAll("#root button").forEach((button) => {
          if (button.textContent.trim().toLowerCase() === "apply key") {
            button.classList.add("flatool-key-button");
            button.setAttribute("aria-label", "Apply key");
          }
        });
        document.querySelectorAll(".flatool-download-all-button").forEach((button) => {
          if (button.dataset.flatoolWired === "true") {
            return;
          }
          button.dataset.flatoolWired = "true";
          button.addEventListener("click", () => {
            const downloadButtons = Array.from(document.querySelectorAll("#root button")).filter(
              (candidate) =>
                candidate !== button &&
                !candidate.classList.contains("flatool-download-all-button") &&
                candidate.textContent.trim().toLowerCase().startsWith("download "),
            );

            downloadButtons.forEach((downloadButton, index) => {
              setTimeout(() => downloadButton.click(), index * 700);
            });
          });
        });
      };

      const observer = new MutationObserver(() => {
        polishFlatoolUi();
        if (appIsReady()) {
          setTimeout(revealApp, 6000);
          observer.disconnect();
        }
      });

      observer.observe(document.getElementById("root"), {
        childList: true,
        subtree: true,
      });

      const polishObserver = new MutationObserver(polishFlatoolUi);
      polishObserver.observe(document.getElementById("root"), {
        childList: true,
        subtree: true,
      });

      setTimeout(revealApp, 90000);
    </script>
  </body>
</html>
