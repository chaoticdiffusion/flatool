<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Logos | Curious Curriculum Club</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/browser@0.99.2/build/stlite.css" />
    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
      }

      body {
        background: #f7f3ec;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@0.99.2/build/stlite.js";

      mount(
        {
          entrypoint: "app.py",
          files: {
            "app.py": {
              url: "./app.py",
            },
            "logos_core.py": {
              url: "./logos_core.py",
            },
          },
          requirements: ["python-pptx", "PyMuPDF"],
          streamlitConfig: {
            "client.toolbarMode": "viewer",
          },
        },
        document.getElementById("root"),
      );
    </script>
  </body>
</html>
