<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Flatool | Curious Curriculum Club</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/browser@1.7.2/build/stlite.css" />
    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
      }

      body {
        background: #111111;
      }

      #flatool-boot-cover {
        align-items: center;
        background: #111111;
        color: #f7f2e8;
        display: flex;
        inset: 0;
        justify-content: center;
        position: fixed;
        z-index: 2147483647;
      }

      #flatool-boot-cover.is-hidden {
        opacity: 0;
        pointer-events: none;
        transition: opacity 240ms ease;
      }

      .boot-logo {
        display: block;
        height: auto;
        max-width: min(52vw, 18rem);
      }

      .boot-fallback {
        color: #ffffff;
        display: none;
        font-family: Arial, Helvetica, sans-serif;
        font-size: clamp(2rem, 5vw, 3.6rem);
        font-weight: 900;
        letter-spacing: 0;
        line-height: 1;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div id="flatool-boot-cover">
      <img class="boot-logo" src="./logo.png" alt="Flatool" onerror="this.style.display='none';document.querySelector('.boot-fallback').style.display='block';" />
      <div class="boot-fallback">Flatool</div>
    </div>
    <div id="root"></div>
    <script type="module">
      import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@1.7.2/build/stlite.js";

      mount(
        {
          entrypoint: "app.py",
          files: {
            "app.py": {
              url: "./app.py",
            },
            "flatool_core.py": {
              url: "./flatool_core.py",
            },
          },
          requirements: ["python-pptx", "PyMuPDF"],
          streamlitConfig: {
            "client.toolbarMode": "viewer",
          },
        },
        document.getElementById("root"),
      );

      const revealApp = () => {
        const cover = document.getElementById("flatool-boot-cover");
        cover?.classList.add("is-hidden");
        setTimeout(() => cover?.remove(), 320);
      };
      const appIsReady = () =>
        document.querySelector('[data-testid="stTextInput"]') ||
        document.querySelector('[data-testid="stFileUploader"]') ||
        document.querySelector('[data-testid="stRadio"]');

      const observer = new MutationObserver(() => {
        if (appIsReady()) {
          setTimeout(revealApp, 6000);
          observer.disconnect();
        }
      });

      observer.observe(document.getElementById("root"), {
        childList: true,
        subtree: true,
      });

      setTimeout(revealApp, 90000);
    </script>
  </body>
</html>
