<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Flatool | Curious Curriculum Club</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/browser@1.7.2/build/stlite.css" />
    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
      }

      body {
        background: #111111;
      }

      #root {
        visibility: hidden;
      }

      body.flatool-ready #root {
        visibility: visible;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@1.7.2/build/stlite.js";

      mount(
        {
          entrypoint: "app.py",
          files: {
            "app.py": {
              url: "./app.py",
            },
            "flatool_core.py": {
              url: "./flatool_core.py",
            },
          },
          requirements: ["python-pptx", "PyMuPDF"],
          streamlitConfig: {
            "client.toolbarMode": "viewer",
          },
        },
        document.getElementById("root"),
      );

      const revealApp = () => document.body.classList.add("flatool-ready");
      const observer = new MutationObserver(() => {
        if (document.querySelector(".stApp")) {
          revealApp();
          observer.disconnect();
        }
      });

      observer.observe(document.getElementById("root"), {
        childList: true,
        subtree: true,
      });

      setTimeout(revealApp, 12000);
    </script>
  </body>
</html>
